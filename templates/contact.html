<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'DM Sans', sans-serif;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4);
      animation: slideUp 0.6s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .badge {
      display: inline-block;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      color: white;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 20px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 8px;
    }
    .subtitle { color: rgba(255,255,255,0.5); font-size: 15px; margin-bottom: 36px; }
    label { display: block; color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500; letter-spacing: 0.5px; margin-bottom: 8px; }
    input, textarea {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 18px;
      color: #fff;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
      margin-bottom: 20px;
    }
    input:focus, textarea:focus {
      border-color: #a78bfa;
      background: rgba(167,139,250,0.08);
    }
    textarea { height: 130px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.2s;
      margin-top: 8px;
    }
    button:hover { opacity: 0.9; transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    .footer { text-align: center; margin-top: 24px; color: rgba(255,255,255,0.3); font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">✉️ Me contacter</div>
    <h1>Laissez-moi un message</h1>
    <p class="subtitle">Je vous répondrai dans les plus brefs délais.</p>

    <div class="row">
      <div>
        <label>Prénom</label>
        <input type="text" placeholder="Jean" />
      </div>
      <div>
        <label>Nom</label>
        <input type="text" placeholder="Dupont" />
      </div>
    </div>

    <label>Email</label>
    <input type="email" placeholder="jean.dupont@email.com" />

    <label>Votre message</label>
    <textarea placeholder="Bonjour, je souhaitais vous contacter au sujet de..."></textarea>

    <button type="button">Envoyer le message 🚀</button>

    <p class="footer">Projet Métriques 2026 — Flask & Python</p>
  </div>
</body>
</html>
