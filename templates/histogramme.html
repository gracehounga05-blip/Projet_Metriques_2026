<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Histogramme Températures Paris</title>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; background: #f5f7fa; }
    h1 { color: #1a1a2e; }
    #chart { width: 100%; height: 520px; }
    #status { margin-top: 12px; color: #666; }
  </style>
</head>
<body>
  <h1>🌡️ Températures à Paris — Histogramme (7 jours)</h1>
  <div id="chart"></div>
  <div id="status"></div>
  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    async function init() {
      try {
        const res = await fetch('/paris', { headers: { 'Accept': 'application/json' } });
        const json = await res.json();

        // On prend 1 point par jour (toutes les 24h = index 0, 24, 48, ...)
        const daily = json.filter((_, i) => i % 24 === 0).slice(0, 7);

        const data = new google.visualization.DataTable();
        data.addColumn('string', 'Date');
        data.addColumn('number', 'Température (°C)');

        daily.forEach(p => {
          const dateStr = p.datetime.split('T')[0];
          data.addRow([dateStr, Number(p.temperature_c)]);
        });

        const options = {
          title: 'Prévisions météo Paris — 7 prochains jours',
          legend: { position: 'none' },
          hAxis: { title: 'Date' },
          vAxis: { title: '°C' },
          colors: ['#4285F4'],
          bar: { groupWidth: '75%' }
        };

        const chart = new google.visualization.ColumnChart(document.getElementById('chart'));
        chart.draw(data, options);
        document.getElementById('status').textContent = `✅ ${daily.length} jours affichés`;
      } catch (err) {
        document.getElementById('status').textContent = 'Erreur : ' + err.message;
      }
    }
  </script>
</body>
</html>
